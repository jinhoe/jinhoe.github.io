<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    {% if page.noindex %}
    <!-- Robots Instructions -->
    <meta name="robots" content="noindex, nofollow">
    {% endif %}

    <!-- RSS Links -->
    <link rel="alternate" type="application/atom+xml" href="{{ '/feed.xml' | relative_url }}" title="{{ site.title }} Feed">

    <!-- Descriptions -->
    <meta name="description" content="{{ page.description | default: site.description | truncate: 160 }}">

    <!-- Page Title -->
    <title>{% if page.layout == 'home' %}{{ site.title }}{% else %}{{ page.title }} – Jinhoe{% endif %}</title>

    {% seo %}

    <!-- Good ol ico file -->
    <link rel="shortcut icon" href="/favicon.ico">
<link href="/assets/css/main.min.css" rel="stylesheet">
</head>

<body class="{{ page.body_class | default: 'page-default' }}">
    <main class="main">{{ content }}
    </main>
</body>
</html>
